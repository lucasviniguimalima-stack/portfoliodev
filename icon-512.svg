<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo com bordas arredondadas -->
  <rect width="512" height="512" rx="80" fill="#050505"/>

  <!-- Borda sutil -->
  <rect x="6" y="6" width="500" height="500" rx="76"
        fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.2"/>

  <!-- <LV/> centralizado -->
  <text text-anchor="middle" font-family="'Courier New', Courier, monospace"
        font-size="118" fill="#00d4ff" filter="url(#glow)">
    <tspan x="256" y="300" opacity="0.5">&lt;</tspan>
    <tspan font-weight="bold" opacity="1">LV</tspan>
    <tspan opacity="0.5">/&gt;</tspan>
  </text>
</svg>
